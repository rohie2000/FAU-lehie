<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FAU-lehie</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7fb;
      --text: #172033;
      --muted: #5f6b7a;
      --accent: #146c94;
      --panel: #ffffff;
      --line: #d8dde6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      background: var(--bg);
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    main {
      width: min(720px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: clamp(28px, 5vw, 48px);
      box-shadow: 0 18px 50px rgba(23, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2rem, 6vw, 3.5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.6;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      color: var(--accent);
      font-weight: 700;
      font-size: 0.95rem;
      text-transform: uppercase;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <main>
    <div class="status"><span class="dot"></span> GitHub Pages Test</div>
    <h1>FAU-lehie</h1>
    <p>
      Diese einfache Startseite prueft, ob das Repository korrekt ueber
      GitHub Pages veroeffentlicht wird.
    </p>
  </main>
</body>
</html>
